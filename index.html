<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Pet</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../Css/navbar.css">
  <link rel="stylesheet" href="../Css/menu.css">
  <link rel="stylesheet" href="../Css/search.css">
  <link rel="stylesheet" href="../Css/banner.css">
  <link rel="stylesheet" href="../Css/card.css">
  <link rel="stylesheet" href="../Css/circle-feature.css">

  <!-- Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar bg-body-tertiary">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center">
        <img src="../Image/Logo.png" style="width:50px;" alt="">
        <h2 class="ms-2">THE PET</h2>
      </a>
      <div class="d-flex gap-3">
        <i class="fa-solid fa-cart-arrow-down"></i>
        <i class="fa-regular fa-heart"></i>
        <i class="fa-regular fa-user"></i>
      </div>
    </div>
  </nav>

  <!-- Menu Buttons -->
  <div class="container text-center my-3">
    <div class="row g-2 justify-content-center">
      <div class="col-auto"><button class="btn btn-light">All Product</button></div>
      <div class="col-auto"><button class="btn btn-light">Pet Food</button></div>
      <div class="col-auto"><button class="btn btn-light">Toys</button></div>
      <div class="col-auto"><button class="btn btn-light">Beds</button></div>
      <div class="col-auto"><button class="btn btn-light">Grooming</button></div>
      <div class="col-auto"><button class="btn btn-light">Accessories</button></div>
    </div>
  </div>

  <!-- Search -->
  <div class="container px-5">
    <input class="form-control" type="search" placeholder="Search for your pet...">
  </div>

  <!-- Banner -->
  <section class="container my-4 text-center text-white bg-dark p-5 rounded">
    <h1 class="display-5">Welcome to THE PETS</h1>
    <p>Everything you need for your pets</p>
  </section>

  <!-- Products -->
  <section class="container my-4">
    <h3>Pet Food</h3>

    <div class="row g-4">

      <!-- Card -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card">
          <img src="../Image/dogfood.png" class="card-img-top">
          <div class="card-body">
            <h5>Dog Food</h5>
            <p>$29.99</p>
            <button class="btn btn-dark w-100">Add to Cart</button>
          </div>
        </div>
      </div>

      <!-- Card -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card">
          <img src="../Image/catfood.png" class="card-img-top">
          <div class="card-body">
            <h5>Cat Food</h5>
            <p>$89.99</p>
            <button class="btn btn-dark w-100">Add to Cart</button>
          </div>
        </div>
      </div>

      <!-- Card -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card">
          <img src="../Image/fishfood.png" class="card-img-top">
          <div class="card-body">
            <h5>Fish Food</h5>
            <p>$49.99</p>
            <button class="btn btn-dark w-100">Add to Cart</button>
          </div>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
